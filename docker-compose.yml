services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: skycast-backend
    env_file:
      - ./backend/.env
    environment:
      HOST: 0.0.0.0
      PORT: 8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    init: true
    stop_grace_period: 20s
    restart: unless-stopped
